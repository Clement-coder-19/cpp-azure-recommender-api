name: Build and Deploy C++ API to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Tag Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/cpp-recommender:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/cpp-recommender:latest .

    - name: Push Image to ACR
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/cpp-recommender:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/cpp-recommender:latest

    - name: Deploy to Azure Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        acrName: ${{ secrets.ACR_NAME }}
        acrUsername: ${{ secrets.ACR_USERNAME }}
        acrPassword: ${{ secrets.ACR_PASSWORD }}
        containerAppName: 'recommender-app'
        resourceGroup: 'rg-cpp-recommender'
        imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/cpp-recommender:${{ github.sha }}
